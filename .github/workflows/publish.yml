name: Node.js Package

on: [push]

# on:
#   release:
#     types: [created]

jobs:

  publish-npm:
    # needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # npmjs 发布走 npm trusted publisher(OIDC)，这里不要再传 NPM_TOKEN。
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      # - run: npm ci
      - run: npm publish --provenance --access public

  publish-gpr:
    # needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # GitHub Packages 目前没有 npm 那种 trusted publisher，继续使用 GITHUB_TOKEN。
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
          scope: '@jx3box'
      # - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 12
  
      - name: OSS
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: "oss-cn-hangzhou.aliyuncs.com"
          access-key-id: ${{secrets.AccessKey_ID}}
          access-key-secret: ${{secrets.Access_Key_Secret}}
      - run: ossutil cp -rf data oss://jx3box/data/global
      - run: ossutil cp -rf js oss://jx3box/static/jx3box-common/js
      - run: ossutil cp -rf css oss://jx3box/static/jx3box-common/css
      # - run: ossutil cp -rf css oss://jx3box-www/jx3box-common/css
      - run: ossutil cp -rf fonts oss://jx3box/static/fonts
